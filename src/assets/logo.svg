<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="45" fill="#FF6B6B"/>
  
  <!-- 龙虾身体 -->
  <ellipse cx="50" cy="55" rx="20" ry="25" fill="#FF4444"/>
  
  <!-- 龙虾头 -->
  <circle cx="50" cy="35" r="15" fill="#FF4444"/>
  
  <!-- 眼睛 -->
  <circle cx="44" cy="32" r="4" fill="white"/>
  <circle cx="56" cy="32" r="4" fill="white"/>
  <circle cx="44" cy="32" r="2" fill="black"/>
  <circle cx="56" cy="32" r="2" fill="black"/>
  
  <!-- 触须 -->
  <path d="M 38 28 Q 30 20 25 15" stroke="#FF4444" stroke-width="2" fill="none"/>
  <path d="M 62 28 Q 70 20 75 15" stroke="#FF4444" stroke-width="2" fill="none"/>
  
  <!-- 大钳子 -->
  <ellipse cx="25" cy="50" rx="12" ry="8" fill="#FF6666"/>
  <ellipse cx="75" cy="50" rx="12" ry="8" fill="#FF6666"/>
  
  <!-- 钳子上的肌肉线条 💪 -->
  <path d="M 20 48 L 28 48" stroke="#CC0000" stroke-width="1"/>
  <path d="M 72 48 L 80 48" stroke="#CC0000" stroke-width="1"/>
  
  <!-- 尾巴 -->
  <path d="M 40 75 L 50 90 L 60 75" fill="#FF4444"/>
  
  <!-- 腿 -->
  <line x1="35" y1="60" x2="25" y2="70" stroke="#FF4444" stroke-width="2"/>
  <line x1="65" y1="60" x2="75" y2="70" stroke="#FF4444" stroke-width="2"/>
  <line x1="38" y1="65" x2="30" y2="75" stroke="#FF4444" stroke-width="2"/>
  <line x1="62" y1="65" x2="70" y2="75" stroke="#FF4444" stroke-width="2"/>
  
  <!-- 微笑 -->
  <path d="M 45 42 Q 50 45 55 42" stroke="black" stroke-width="1.5" fill="none"/>
</svg>